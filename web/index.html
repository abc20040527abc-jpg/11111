<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BingX SMC Scanner</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --ink: #17211f;
      --muted: #66706b;
      --line: #d9dfd8;
      --panel: #ffffff;
      --long: #087f5b;
      --short: #b42318;
      --amber: #b7791f;
      --teal: #0f766e;
      --blue: #2563eb;
      --shadow: 0 14px 34px rgba(23, 33, 31, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
      letter-spacing: 0;
    }
    button, input, select { font: inherit; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
    }
    aside {
      background: #101815;
      color: #f7faf8;
      padding: 22px;
      border-right: 1px solid #0b110f;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }
    .mark {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255,255,255,.18);
      background: #18231f;
      display: grid;
      place-items: center;
      border-radius: 8px;
    }
    .mark svg { width: 28px; height: 28px; }
    h1 {
      font-size: 18px;
      margin: 0;
      font-weight: 700;
    }
    .sub {
      margin: 2px 0 0;
      color: #a9b5af;
      font-size: 12px;
    }
    label {
      display: block;
      color: #c6d0cb;
      font-size: 12px;
      margin: 16px 0 7px;
    }
    input, select {
      width: 100%;
      border: 1px solid #2b3834;
      background: #0b110f;
      color: #f7faf8;
      border-radius: 6px;
      padding: 10px 11px;
      outline: none;
      min-height: 40px;
    }
    input:focus, select:focus { border-color: #5eead4; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .actions {
      display: grid;
      gap: 10px;
      margin-top: 20px;
    }
    .primary {
      border: 0;
      border-radius: 6px;
      min-height: 42px;
      background: #19a57f;
      color: #04110d;
      font-weight: 700;
      cursor: pointer;
    }
    .primary:disabled {
      opacity: .65;
      cursor: wait;
    }
    .secondary {
      border: 1px solid #34443e;
      border-radius: 6px;
      min-height: 40px;
      background: transparent;
      color: #dbe7e1;
      cursor: pointer;
    }
    .note {
      margin-top: 18px;
      color: #9eaaa4;
      font-size: 12px;
      line-height: 1.55;
    }
    main {
      min-width: 0;
      padding: 24px;
    }
    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }
    .headline h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }
    .headline p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    .metric {
      min-width: 138px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow);
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }
    .metric strong { font-size: 20px; }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
    }
    .status {
      color: var(--muted);
      font-size: 13px;
      min-height: 20px;
    }
    .bias {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 5px 10px;
      font-size: 12px;
      color: var(--muted);
      background: #f9faf8;
    }
    .bias.on { color: var(--long); border-color: rgba(8,127,91,.3); }
    .bias.off { color: var(--short); border-color: rgba(180,35,24,.3); }
    .table-wrap {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      overflow: auto;
      box-shadow: var(--shadow);
    }
    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      table-layout: fixed;
    }
    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid #edf0ec;
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }
    th {
      color: #4d5853;
      background: #fbfcfa;
      font-size: 12px;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tbody tr:hover { background: #fafbf8; }
    .symbol { font-weight: 700; }
    .side {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 26px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
    }
    .side.long { color: var(--long); background: rgba(8,127,91,.1); }
    .side.short { color: var(--short); background: rgba(180,35,24,.1); }
    .reasons {
      margin: 0;
      padding: 0;
      list-style: none;
      color: #38443f;
      line-height: 1.45;
      max-height: 94px;
      overflow: auto;
    }
    .reasons li + li { margin-top: 4px; }
    .link {
      color: var(--blue);
      text-decoration: none;
      font-weight: 600;
    }
    .empty {
      border: 1px dashed #bdc8c1;
      border-radius: 8px;
      padding: 34px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,.65);
    }
    .mini-chart {
      width: 100%;
      height: 54px;
      margin-top: 22px;
      border: 1px solid #26332e;
      border-radius: 8px;
      background:
        linear-gradient(90deg, transparent 0 12%, rgba(255,255,255,.08) 12% 13%, transparent 13% 28%, rgba(255,255,255,.08) 28% 29%, transparent 29% 44%, rgba(255,255,255,.08) 44% 45%, transparent 45% 60%, rgba(255,255,255,.08) 60% 61%, transparent 61%),
        linear-gradient(180deg, #16211d, #0b110f);
      position: relative;
      overflow: hidden;
    }
    .mini-chart::before {
      content: "";
      position: absolute;
      inset: 12px 12px 10px;
      background: linear-gradient(135deg, transparent 0 12%, #2dd4bf 12% 14%, transparent 14% 27%, #f59e0b 27% 29%, transparent 29% 46%, #2dd4bf 46% 48%, transparent 48% 64%, #ef4444 64% 66%, transparent 66%);
    }
    .mini-chart::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      top: 26px;
      border-top: 1px dashed rgba(255,255,255,.28);
    }
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      aside {
        position: static;
        height: auto;
      }
      .topbar { grid-template-columns: 1fr; }
      .metric { min-width: 0; }
      main { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" fill="none">
            <path d="M5 22h5l3-9 5 13 4-16 5 8" stroke="#5eead4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5 8h22" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>BingX SMC Scanner</h1>
          <p class="sub">SMC / EMA200 / Bollinger / Jin10</p>
        </div>
      </div>

      <label for="symbol">指定幣種</label>
      <input id="symbol" placeholder="留空掃描全部，例如 BTC-USDT">

      <div class="row">
        <div>
          <label for="interval">週期</label>
          <select id="interval">
            <option value="15m">15m</option>
            <option value="1h" selected>1h</option>
            <option value="4h">4h</option>
            <option value="1d">1d</option>
          </select>
        </div>
        <div>
          <label for="top">顯示筆數</label>
          <input id="top" type="number" min="1" max="200" value="30">
        </div>
      </div>

      <div class="row">
        <div>
          <label for="maxSymbols">掃描數量</label>
          <input id="maxSymbols" type="number" min="0" max="2000" value="80">
        </div>
        <div>
          <label for="limit">K 線數</label>
          <input id="limit" type="number" min="220" max="500" value="260">
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="scanBtn">開始掃描</button>
        <button class="secondary" id="btcBtn">掃 BTC-USDT</button>
      </div>

      <div class="mini-chart" aria-hidden="true"></div>
      <p class="note">預設只做訊號掃描，不會下單。止損用前低/前高，止盈顯示 1R 與 1.5R。金十事件面請編輯同資料夾的 jin10_events.json 或設定 API。</p>
    </aside>

    <main>
      <div class="topbar">
        <div class="headline">
          <h2>交易訊號</h2>
          <p>符合任一 SMC 條件即可列出；EMA200 與布林帶作為另一組觸發邏輯。</p>
        </div>
        <div class="metric"><span>訊號數</span><strong id="signalCount">0</strong></div>
        <div class="metric"><span>事件面</span><strong id="biasText">NEUTRAL</strong></div>
      </div>

      <div class="toolbar">
        <div class="status" id="status">準備就緒</div>
        <span class="bias" id="biasPill">NEUTRAL</span>
      </div>

      <div id="content" class="empty">按「開始掃描」取得最新 BingX 合約訊號。</div>
    </main>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const scanBtn = $("scanBtn");
    const content = $("content");
    const statusEl = $("status");

    function fmt(n) {
      const value = Number(n);
      if (!Number.isFinite(value)) return "";
      if (Math.abs(value) >= 100) return value.toFixed(2);
      if (Math.abs(value) >= 1) return value.toFixed(4);
      return value.toPrecision(6);
    }

    function sideClass(side) {
      return side === "LONG" ? "long" : "short";
    }

    function setBias(bias) {
      $("biasText").textContent = bias;
      const pill = $("biasPill");
      pill.textContent = bias;
      pill.className = "bias" + (bias === "RISK_ON" ? " on" : bias === "RISK_OFF" ? " off" : "");
    }

    function buildUrl() {
      const params = new URLSearchParams({
        symbol: $("symbol").value.trim(),
        interval: $("interval").value,
        top: $("top").value,
        max_symbols: $("maxSymbols").value,
        limit: $("limit").value
      });
      return "/api/scan?" + params.toString();
    }

    function render(data) {
      $("signalCount").textContent = data.total_signals;
      setBias(data.news_bias);
      if (!data.signals.length) {
        content.className = "empty";
        content.textContent = "目前沒有符合條件的標的。";
        return;
      }
      content.className = "table-wrap";
      content.innerHTML = `
        <table>
          <thead>
            <tr>
              <th style="width:110px">幣種</th>
              <th style="width:86px">方向</th>
              <th style="width:100px">進場</th>
              <th style="width:100px">止損</th>
              <th style="width:100px">1R</th>
              <th style="width:100px">1.5R</th>
              <th style="width:84px">風險</th>
              <th>觸發原因</th>
              <th style="width:112px">圖表</th>
            </tr>
          </thead>
          <tbody>
            ${data.signals.map((s) => `
              <tr>
                <td class="symbol">${s.symbol}</td>
                <td><span class="side ${sideClass(s.side)}">${s.side}</span></td>
                <td>${fmt(s.entry)}</td>
                <td>${fmt(s.stop)}</td>
                <td>${fmt(s.tp_1r)}</td>
                <td>${fmt(s.tp_15r)}</td>
                <td>${fmt(s.risk_pct)}%</td>
                <td><ul class="reasons">${s.reasons.map((r) => `<li>${r}</li>`).join("")}</ul></td>
                <td><a class="link" href="${s.tradingview_url}" target="_blank" rel="noreferrer">TradingView</a></td>
              </tr>
            `).join("")}
          </tbody>
        </table>`;
    }

    async function scan() {
      scanBtn.disabled = true;
      statusEl.textContent = "掃描中，正在抓 BingX K 線...";
      try {
        const res = await fetch(buildUrl());
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "掃描失敗");
        render(data);
        const skipped = data.failure_count ? `，略過 ${data.failure_count} 個 API/解析錯誤` : "";
        statusEl.textContent = `完成，CSV 已更新${skipped}`;
      } catch (err) {
        content.className = "empty";
        content.textContent = err.message;
        statusEl.textContent = "掃描失敗";
      } finally {
        scanBtn.disabled = false;
      }
    }

    scanBtn.addEventListener("click", scan);
    $("btcBtn").addEventListener("click", () => {
      $("symbol").value = "BTC-USDT";
      scan();
    });
  </script>
</body>
</html>
