<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BingX SMC 免費掃描器</title>
  <style>
    :root { --ink:#15211d; --muted:#61706a; --line:#d9e2dd; --bg:#f4f7f5; --panel:#fff; --brand:#047857; --short:#b42318; --amber:#b7791f; }
    * { box-sizing:border-box; } body { margin:0; background:var(--bg); color:var(--ink); font:14px "Segoe UI", "Noto Sans TC", Arial, sans-serif; letter-spacing:0; }
    .app { min-height:100vh; display:grid; grid-template-columns:310px minmax(0,1fr); }
    aside { padding:22px; color:#edf7f1; background:#101b16; } main { min-width:0; padding:24px; }
    .brand { display:flex; gap:11px; align-items:center; margin-bottom:23px; } .mark { width:40px; height:40px; display:grid; place-items:center; border:1px solid #395047; border-radius:7px; color:#62d8ae; font-size:20px; }
    h1 { margin:0; font-size:18px; } .sub { margin:3px 0 0; color:#a9b9b0; font-size:12px; }
    label { display:block; margin:16px 0 7px; color:#c5d1ca; font-size:12px; } input,select { width:100%; min-height:40px; padding:9px 10px; border:1px solid #34473d; border-radius:6px; color:#f5fbf7; background:#0b120e; font:inherit; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; } button { min-height:42px; border-radius:6px; font:inherit; font-weight:700; cursor:pointer; }
    .actions { display:grid; gap:9px; margin-top:20px; } .primary { border:0; color:#052016; background:#4fd19d; } .secondary { border:1px solid #3c5046; color:#dce9e2; background:transparent; } button:disabled { opacity:.62; cursor:wait; }
    .note { margin:18px 0 0; color:#a9b9b0; font-size:12px; line-height:1.6; } .headline h2 { margin:0; font-size:25px; } .headline p { margin:6px 0 0; color:var(--muted); }
    .top { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:18px; } .metrics { display:flex; gap:10px; } .metric { min-width:112px; padding:10px 12px; border:1px solid var(--line); border-radius:7px; background:var(--panel); } .metric span { display:block; color:var(--muted); font-size:11px; } .metric strong { display:block; margin-top:4px; font-size:18px; }
    .status { display:flex; gap:12px; align-items:center; min-height:46px; margin-bottom:14px; padding:10px 12px; border:1px solid var(--line); border-radius:7px; background:var(--panel); color:var(--muted); } .dot { width:8px; height:8px; border-radius:50%; background:#91a59a; } .dot.busy { background:var(--amber); } .dot.ok { background:var(--brand); } .bias { margin-left:auto; padding:4px 9px; border:1px solid var(--line); border-radius:999px; font-size:12px; } .bias.on { color:var(--brand); } .bias.off { color:var(--short); }
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:7px; background:var(--panel); } table { width:100%; min-width:950px; border-collapse:collapse; table-layout:fixed; } th,td { padding:11px 12px; border-bottom:1px solid #edf1ee; text-align:left; vertical-align:top; } th { position:sticky; top:0; background:#fbfcfb; color:#53635b; font-size:12px; } .symbol { font-weight:700; } .side { display:inline-grid; width:56px; height:25px; place-items:center; border-radius:999px; font-size:12px; font-weight:700; } .long { color:var(--brand); background:#e6f6ee; } .short { color:var(--short); background:#fbedeb; } .reasons { margin:0; padding:0; list-style:none; color:#39483f; line-height:1.45; } .reasons li+li { margin-top:3px; } a { color:#1764c0; font-weight:700; text-decoration:none; } .empty { padding:46px 24px; text-align:center; border:1px dashed #b6c6bd; border-radius:7px; color:var(--muted); background:#fff; }
    @media (max-width:860px) { .app { grid-template-columns:1fr; } main { padding:16px; } .top { display:block; } .metrics { margin-top:15px; } }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand"><div class="mark">⌁</div><div><h1>BingX SMC Scanner</h1><p class="sub">免費瀏覽器掃描版</p></div></div>
      <label for="symbol">指定幣種</label><input id="symbol" placeholder="留白＝掃描 BingX USDT 合約">
      <div class="row"><div><label for="interval">週期</label><select id="interval"><option value="15m">15m</option><option value="1h" selected>1h</option><option value="4h">4h</option><option value="1d">1d</option></select></div><div><label for="maxSymbols">掃描數量</label><input id="maxSymbols" type="number" min="0" max="1000" value="80" title="0 代表全部幣種"></div></div>
      <div class="row"><div><label for="top">顯示訊號</label><input id="top" type="number" min="1" max="200" value="30"></div><div><label for="biasSelect">金十偏向</label><select id="biasSelect"><option value="NEUTRAL">中性</option><option value="RISK_ON">風險偏好</option><option value="RISK_OFF">避險偏好</option></select></div></div>
      <div class="actions"><button class="primary" id="scanBtn">開始掃描</button><button class="secondary" id="btcBtn">只掃 BTC-USDT</button></div>
      <p class="note">完全免費，直接使用 BingX 公開行情。掃描數量填 0 會掃全部幣種，但完成時間較久，也可能遇到交易所流量限制。此版本不會下單。金十偏向改為手動選擇，作為訊號方向的提醒。</p>
    </aside>
    <main>
      <div class="top"><div class="headline"><h2>SMC 交易機會</h2><p>任何一項 SMC 條件，或 EMA200 加布林帶條件符合時，即顯示候選訊號。</p></div><div class="metrics"><div class="metric"><span>訊號數</span><strong id="signalCount">0</strong></div><div class="metric"><span>市場偏向</span><strong id="biasText">NEUTRAL</strong></div></div></div>
      <div class="status"><i id="dot" class="dot"></i><span id="status">準備掃描 BingX 公開行情</span><span id="biasPill" class="bias">NEUTRAL</span></div>
      <div id="content" class="empty">選擇週期後按「開始掃描」。掃描時請保持此頁開啟。</div>
    </main>
  </div>
<script>
  const API = "https://open-api.bingx.com";
  const $ = id => document.getElementById(id);
  const fmt = n => { n=Number(n); if(!Number.isFinite(n)) return ""; return Math.abs(n)>=100?n.toFixed(2):Math.abs(n)>=1?n.toFixed(4):n.toPrecision(6); };
  const setStatus = (message, state="") => { $("status").textContent=message; $("dot").className="dot "+state; };
  function setBias(bias) { $("biasText").textContent=bias; const p=$("biasPill"); p.textContent=bias; p.className="bias "+(bias==="RISK_ON"?"on":bias==="RISK_OFF"?"off":""); }
  function ema(values, period) { let value=values[0], factor=2/(period+1); for(let i=1;i<values.length;i++) value=values[i]*factor+value*(1-factor); return value; }
  function std(values) { const avg=values.reduce((a,b)=>a+b,0)/values.length; return Math.sqrt(values.reduce((a,b)=>a+(b-avg)**2,0)/values.length); }
  function priorExtreme(c, type) { const end=c.length-3, start=Math.max(2,end-30); let result=type==="low"?Infinity:-Infinity; for(let i=start;i<=end;i++) result=type==="low"?Math.min(result,c[i].low):Math.max(result,c[i].high); return result; }
  function analyse(symbol, rows, bias) {
    const c=rows.map(x=>({open:+x.open,high:+x.high,low:+x.low,close:+x.close})); if(c.length<205) return [];
    const last=c.at(-1), prev=c.at(-2), closes=c.map(x=>x.close), e=ema(closes.slice(-205),200), recent=c.slice(-21,-1), mid=recent.reduce((a,x)=>a+x.close,0)/20, band=std(recent.map(x=>x.close))*2;
    const upper=mid+band, lower=mid-band, high=priorExtreme(c,"high"), low=priorExtreme(c,"low"), longReasons=[], shortReasons=[];
    if(last.close>high) longReasons.push("SMC BOS：收盤突破近期高點 "+fmt(high));
    if(last.close<low) shortReasons.push("SMC BOS：收盤跌破近期低點 "+fmt(low));
    if(last.low<low && last.close>low) longReasons.push("SMC 流動性掃掃：跌破前低後收回");
    if(last.high>high && last.close<high) shortReasons.push("SMC 流動性掃掃：突破前高後收回");
    if(last.low>c.at(-3).high) longReasons.push("SMC 多頭 FVG：跳空 "+fmt(c.at(-3).high)+"-"+fmt(last.low));
    if(last.high<c.at(-3).low) shortReasons.push("SMC 空頭 FVG：缺口 "+fmt(last.high)+"-"+fmt(c.at(-3).low));
    if(last.close>e && prev.close<=lower && last.close>lower) longReasons.push("EMA200 + 布林帶：站上 EMA200 並自下軌反彈");
    if(last.close<e && prev.close>=upper && last.close<upper) shortReasons.push("EMA200 + 布林帶：跌破 EMA200 並自上軌回落");
    const result=[]; const add=(side,reasons,stop)=>{ if(!reasons.length || !Number.isFinite(stop))return; const entry=last.close, risk=Math.abs(entry-stop); if(!risk || risk/entry>.35)return; const goodBias=bias==="NEUTRAL" || (bias==="RISK_ON"&&side==="LONG") || (bias==="RISK_OFF"&&side==="SHORT"); result.push({symbol,side,entry,stop,tp1:side==="LONG"?entry+risk:entry-risk,tp15:side==="LONG"?entry+risk*1.5:entry-risk*1.5,risk:risk/entry*100,reasons,biasOk:goodBias}); };
    add("LONG",longReasons,low); add("SHORT",shortReasons,high); return result;
  }
  async function json(url) { const res=await fetch(url); if(!res.ok) throw new Error("BingX 回應錯誤："+res.status); const data=await res.json(); if(data.code && data.code!==0) throw new Error(data.msg||"BingX API 錯誤"); return data; }
  async function contracts() { const d=await json(API+"/openApi/swap/v2/quote/contracts"); return d.data.filter(x=>x.symbol?.endsWith("-USDT") && x.status===1).map(x=>x.symbol); }
  async function candles(symbol, interval) { const p=new URLSearchParams({symbol,interval,limit:"260"}); const d=await json(API+"/openApi/swap/v3/quote/klines?"+p); return d.data.map(x=>({open:x.open,high:x.high,low:x.low,close:x.close})); }
  function render(signals) { $("signalCount").textContent=signals.length; if(!signals.length){ $("content").className="empty"; $("content").textContent="本次掃描沒有符合條件的訊號。可更換週期或稍後再試。"; return; } $("content").className="table-wrap"; $("content").innerHTML=`<table><thead><tr><th>幣種</th><th>方向</th><th>進場</th><th>止損</th><th>1R</th><th>1.5R</th><th>風險</th><th>觸發原因</th><th>圖表</th></tr></thead><tbody>${signals.map(s=>`<tr><td class="symbol">${s.symbol}</td><td><span class="side ${s.side==="LONG"?"long":"short"}">${s.side==="LONG"?"長多":"短空"}</span></td><td>${fmt(s.entry)}</td><td>${fmt(s.stop)}</td><td>${fmt(s.tp1)}</td><td>${fmt(s.tp15)}</td><td>${fmt(s.risk)}%</td><td><ul class="reasons">${s.reasons.map(r=>`<li>${r}</li>`).join("")}${s.biasOk?"":"<li>與目前市場偏向相反</li>"}</ul></td><td><a target="_blank" rel="noreferrer" href="https://www.tradingview.com/chart/?symbol=BINGX:${s.symbol.replace("-","")}.P">TradingView</a></td></tr>`).join("")}</tbody></table>`; }
  async function scan(){ const button=$("scanBtn"), interval=$("interval").value, bias=$("biasSelect").value, target=$("symbol").value.trim().toUpperCase(); button.disabled=true; setBias(bias); try { setStatus("讀取 BingX 合約清單...","busy"); let symbols=target?[target]:await contracts(); const maximum=Math.max(0,Number($("maxSymbols").value)||0); if(maximum) symbols=symbols.slice(0,maximum); const all=[], workers=6; let next=0, done=0; async function worker(){ while(next<symbols.length){ const current=symbols[next++]; try{ const rows=await candles(current,interval); all.push(...analyse(current,rows,bias)); }catch(_){} done++; setStatus(`掃描中：${done}/${symbols.length} 個幣種...`,"busy"); } } await Promise.all(Array.from({length:workers},worker)); const limit=Math.max(1,Number($("top").value)||30); all.sort((a,b)=>a.risk-b.risk); render(all.slice(0,limit)); setStatus(`完成：掃描 ${symbols.length} 個幣種，找到 ${all.length} 個訊號。`,"ok"); } catch(err) { $("content").className="empty"; $("content").textContent=err.message+"。若持續發生，可能是 BingX 暫時限制瀏覽器請求，請稍後再試。"; setStatus("掃描失敗",""); } finally { button.disabled=false; } }
  $("scanBtn").addEventListener("click",scan); $("btcBtn").addEventListener("click",()=>{$("symbol").value="BTC-USDT";scan();}); setBias("NEUTRAL");
</script>
</body>
</html>
